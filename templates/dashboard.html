<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produksjonscelle</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body data-page="dashboard">
    {% include '_nav.html' %}
    <main class="page">
      <section class="status-strip">
        <div><span class="label">Cellestatus</span><strong id="cellStateBadge">-</strong></div>
        <div><span class="label">Safety</span><strong id="safetyBadge">-</strong></div>
        <div><span class="label">CNC</span><strong id="cncStateBadge">-</strong></div>
        <div><span class="label">Robot</span><strong id="robotStateBadge">-</strong></div>
      </section>

      <section class="layout-2">
        <article class="card">
          <div class="section-title">
            <h1>Aktiv jobb</h1>
          </div>
          <div class="metric-grid">
            <div><span class="label">Jobb</span><strong id="dashJobName">-</strong></div>
            <div><span class="label">Deltype</span><strong id="dashPartType">-</strong></div>
            <div><span class="label">Ferdig</span><strong id="dashProgress">-</strong></div>
            <div><span class="label">Gjenstår</span><strong id="dashRemainingQty">-</strong></div>
          </div>
        </article>

        <article class="card">
          <div class="section-title">
            <h2>Tid</h2>
          </div>
          <div class="metric-grid">
            <div><span class="label">Syklustid</span><strong id="dashCycleTime">-</strong></div>
            <div><span class="label">Produksjon igjen</span><strong id="dashRemainingHours">-</strong></div>
            <div><span class="label">Til påfyll</span><strong id="dashRefillHours">-</strong></div>
            <div><span class="label">Kjørt tid</span><strong id="dashElapsedHours">-</strong></div>
          </div>
        </article>
      </section>

      <section class="machine-grid">
        <article class="card compact">
          <h2>LeanLift</h2>
          <dl id="liftStatus" class="kv"></dl>
        </article>
        <article class="card compact">
          <h2>Robot</h2>
          <dl id="robotStatus" class="kv"></dl>
        </article>
        <article class="card compact">
          <h2>CNC</h2>
          <dl id="cncStatus" class="kv"></dl>
        </article>
        <article class="card compact">
          <h2>Safety</h2>
          <dl id="safetyStatus" class="kv"></dl>
        </article>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
