<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyllekart</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body data-page="shelves">
    {% include '_nav.html' %}
    <main class="page">
      <section class="layout-2">
        <article class="card">
          <div class="section-title">
            <h1>Hyllekart</h1>
            <select id="shelfSelect"></select>
          </div>
          <svg id="shelfSvg" viewBox="0 0 1000 450" role="img"></svg>
          <div id="shelfInfo" class="muted"></div>
        </article>

        <article class="card">
          <h2>Hylleoppsett</h2>
          <div class="form-grid">
            <label>Bredde mm<input id="shelfWidth" type="number" min="1" /></label>
            <label>Dybde mm<input id="shelfDepth" type="number" min="1" /></label>
            <label>Standard Z mm<input id="shelfHeight" type="number" min="1" /></label>
          </div>
          <button id="saveSettingsBtn">Lagre mal</button>

          <h2>Produksjonslokasjoner</h2>
          <div class="form-grid">
            <label>Deltype<select id="layoutPartType"></select></label>
            <label>Kolonner<input id="layoutCols" type="number" value="4" min="1" /></label>
            <label>Rader<input id="layoutRows" type="number" value="3" min="1" /></label>
            <label>Z mm<input id="layoutZ" type="number" value="95" min="1" /></label>
          </div>
          <button id="generateLayoutBtn">Generer hylle</button>
          <dl id="shelfResult" class="kv"></dl>
        </article>
      </section>

      <section class="layout-2">
        <article class="card">
          <h2>Manuell inn/utlasting</h2>
          <div class="form-grid">
            <label>Slot<input id="manualSlotNo" type="number" value="1" min="1" /></label>
            <label>Status<select id="manualStatus"><option value="raw">raw</option><option value="reserved">reserved</option><option value="wip">wip</option><option value="finished">finished</option><option value="quarantine">quarantine</option><option value="blocked">blocked</option></select></label>
            <label>Deltype<select id="manualPartType"></select></label>
          </div>
          <div class="actions">
            <button id="manualLoadBtn">Sett inn</button>
            <button id="manualUnloadBtn" class="secondary">Ta ut</button>
          </div>
          <h2>Sett hele hyllen</h2>
          <div class="form-grid">
            <label>Status<select id="bulkStatus"><option value="raw">raw</option><option value="reserved">reserved</option><option value="wip">wip</option><option value="finished">finished</option><option value="quarantine">quarantine</option><option value="blocked">blocked</option><option value="empty">empty</option></select></label>
          </div>
          <label class="checkbox-line"><input id="bulkIncludeEmpty" type="checkbox" /> Ta med tomme lokasjoner</label>
          <div class="actions">
            <button id="bulkStatusBtn" class="secondary">Sett status</button>
          </div>
        </article>

        <article class="card">
          <h2>Koordinater</h2>
          <div class="table-wrap">
            <table>
              <thead><tr><th>#</th><th>Deltype</th><th>Status</th><th>Dia</th><th>X</th><th>Y</th><th>Z</th></tr></thead>
              <tbody id="coordsTable"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
