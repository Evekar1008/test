<!doctype html><html lang="no"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Hyllekonfig</title><link rel="stylesheet" href="/static/style.css"/></head>
<body data-page="shelves">{% include '_nav.html' %}
<main>
<section class="card"><h2>Velg hylle (en om gangen)</h2><div class="row"><select id="shelfSelect"></select><button id="loadShelfBtn">Last hylle</button></div></section>
<section class="card"><h2>Grafisk layoutgenerator</h2>
<div class="row"><label>Deltype</label><select id="layoutPartType"></select><label>Kolonner</label><input id="layoutCols" type="number" value="4"/><label>Rader</label><input id="layoutRows" type="number" value="3"/><label>Z</label><input id="layoutZ" type="number" value="95"/></div>
<button id="generateLayoutBtn">Generer layout grafisk</button><ul id="shelfResult"></ul>
</section>
<section class="card"><h2>Hyllekart</h2><svg id="shelfSvg" viewBox="0 0 1000 450"></svg><p id="shelfInfo"></p></section>
<section class="card"><h2>Manuell inn/utlasting</h2><div class="row"><label>Slot #</label><input id="manualSlotNo" type="number" value="1"/><label>Status</label><select id="manualStatus"><option value="empty">empty</option><option value="raw">raw</option><option value="in_process">in_process</option><option value="finished">finished</option><option value="blocked">blocked</option></select><label>Deltype</label><select id="manualPartType"></select></div><div class="row"><button id="manualLoadBtn">Sett del på lokasjon</button><button id="manualUnloadBtn">Fjern del fra lokasjon</button></div></section>
</main><script src="/static/app.js"></script></body></html>
